########################################
# BACKEND
########################################

backend = "glx";
vsync = true;
use-damage = true;

########################################
# ROUNDED CORNERS (solo ventanas)
########################################

corner-radius = 6;

rounded-corners-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'polybar'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'toolbar'"
];

########################################
# BLUR (DESACTIVADO)
########################################

blur-method = "none";
blur-background = false;

########################################
# SHADOWS (SUAVES)
########################################

shadow = true;
shadow-radius = 8;
shadow-opacity = 0.25;
shadow-offset-x = -5;
shadow-offset-y = -5;

shadow-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'polybar'",
  "window_type = 'dock'"
];

########################################
# TRANSPARENCIA GLOBAL
########################################

inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;

########################################
# FADING
########################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

########################################
# OPTIMIZACIÓN
########################################

detect-client-opacity = true;
detect-rounded-corners = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;