palette = "grayscale"

[os]
disabled = false
style = "bg:black fg:white"

[os.symbols]
Arch = "¾░úç"
Linux = "¾░î¢"

[username]
show_always = true
style_user = "bg:black fg:white"
style_root = "bg:black fg:white"
format = '[ $user]($style)'

[directory]
style = "bg:gray2 fg:white"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = "´Éÿ"
style = "bg:gray3"
format = '[[ $symbol $branch ](fg:white bg:gray3)]($style)'

[git_status]
style = "bg:gray3"
format = '[[($all_status$ahead_behind )](fg:white bg:gray3)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:gray4"
format = '[[ $symbol( $version) ](fg:white bg:gray4)]($style)'

[c]
symbol = "¯ÿ× "
style = "bg:gray4"
format = '[[ $symbol( $version) ](fg:white bg:gray4)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:gray4"
format = '[[ $symbol( $version) ](fg:white bg:gray4)]($style)'

[golang]
symbol = "¯ÿº"
style = "bg:gray4"
format = '[[ $symbol( $version) ](fg:white bg:gray4)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:gray4"
format = '[[ $symbol( $version) ](fg:white bg:gray4)]($style)'

[java]
symbol = "¯ëû "
style = "bg:gray4"
format = '[[ $symbol( $version) ](fg:white bg:gray4)]($style)'

[kotlin]
symbol = "¯ÿ┤"
style = "bg:gray4"
format = '[[ $symbol( $version) ](fg:white bg:gray4)]($style)'

[haskell]
symbol = "¯ÿƒ"
style = "bg:gray4"
format = '[[ $symbol( $version) ](fg:white bg:gray4)]($style)'

[python]
symbol = "¯ÿå"
style = "bg:gray4"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:white bg:gray4)]($style)'

[conda]
symbol = " ´äî "
style = "fg:white bg:gray5"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:white"
format = '[[ ´É║ $time ](fg:black bg:white)]($style)'

[line_break]
disabled = true

[character]
success_symbol = '[ÔØ»](bold fg:white)'
error_symbol = '[ÔØ»](bold fg:white)'

[cmd_duration]
show_milliseconds = true
format = "ÔÅ▒ $duration "
style = "fg:white"
disabled = false


[palettes.grayscale]
black = "#111111"
gray2 = "#2a2a2a"
gray3 = "#3a3a3a"
gray4 = "#555555"
gray5 = "#777777"
white = "#eeeeee"