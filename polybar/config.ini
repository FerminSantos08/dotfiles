;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; COLORS — CATPPUCCIN MOCHA (AZUL INTEGRADO)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[colors]
bg = #AA16202B
fg = #CDD6F4

surface0 = #1e2936
surface1 = #223041
surface2 = #5b6c85

rosewater = #F5E0DC
mauve = #CBA6F7
blue = #89B4FA
green = #A6E3A1
yellow = #F9E2AF
red = #F38BA8

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; BAR
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[bar/main]
width = 100%
height = 28
radius = 0

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0
border-size = 0

padding-left = 3
padding-right = 3
module-margin = 1

font-0 = Inter:size=12;2
font-1 = JetBrainsMono Nerd Font:size=11;2

modules-left = i3
modules-right = music audio network-status battery date tray

cursor-click = pointer
enable-ipc = true

separator = " | "
separator-foreground = ${colors.surface2}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; i3 WORKSPACES
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/i3]
type = internal/i3
strip-wsnumbers = true
index-sort = true

label-focused = %index%
label-focused-background = ${colors.surface1}
label-focused-foreground = ${colors.blue}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-background = ${colors.bg}
label-unfocused-foreground = ${colors.surface2}
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg}
label-urgent-padding = 2


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; MUSIC
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/music]
type = custom/script
exec = playerctl metadata --format '{{ artist }} - {{ title }}'
interval = 5

format = <label>
format-fail = ""

label = %{T1}󰝚%{T-}  %output%
label-foreground = ${colors.blue}
label-padding = 2


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; AUDIO
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/audio]
type = internal/pulseaudio
interval = 2

format-volume = <label-volume>
format-muted = <label-muted>

label-volume = %{T1}󰕾%{T-}  %percentage%%
label-muted  = %{T1}󰖁%{T-}  muted

label-volume-foreground = ${colors.green}
label-muted-foreground = ${colors.red}
label-padding = 2


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; NETWORK
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/network-status]
type = custom/script
exec = ~/.config/polybar/scripts/net_status.sh
interval = 5

format = <label>

label = %{T1}󰖩%{T-}  %output%
label-foreground = ${colors.yellow}
label-padding = 2


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; BATTERY
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/battery]
type = internal/battery
battery = BAT0
adapter = AC
poll-interval = 5

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>

label-charging    = %{T1}󰂄%{T-}  %percentage%%
label-discharging = %{T1}󰁹%{T-}  %percentage%%
label-full        = %{T1}󰁹%{T-}  100%

label-charging-foreground = ${colors.green}
label-discharging-foreground = ${colors.mauve}
label-full-foreground = ${colors.blue}
label-padding = 2


;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; DATE / TIME
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/date]
type = internal/date
interval = 30

date = %a %d %b
time = %H:%M

label = %{T1}󰃭%{T-}  %date% %time%
label-foreground = ${colors.rosewater}
label-padding = 2

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; TRAY
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/tray]
type = internal/tray

tray-spacing = 6
tray-size = 18
tray-background = ${colors.bg}