# ===== HYPRLAND CONFIG =====

################
### MONITORS ###
################

monitor = HDMI-A-1,1920x1080@74.97,0x0,1
monitor = eDP-1,1920x1080@144,1920x0,1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

env = GTK_THEME,Graphite-Dark
env = GTK_ICON_THEME,Colloid-Dark


#####################
### LOOK AND FEEL ###
#####################

general {

    gaps_in = 6
    gaps_out = 10
    border_size = 2

    col.active_border = rgba(ffffffee) rgba(dededeff) 45deg
    col.inactive_border = rgba(4a4a4aaa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {

    rounding = 10
    rounding_power = 2

    active_opacity = 0.95
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 10
        render_power = 3
        color = rgba(00000099)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        vibrancy = 0.2
    }
}


################
### ANIMATIONS ###
################

animations {

    enabled = yes

    bezier = smooth,0.25,1,0.5,1
    bezier = overshot,0.13,0.99,0.29,1.1

    animation = global,1,10,default

    animation = border,1,5,smooth
    animation = fade,1,5,smooth

    animation = windows,1,5,overshot,slide
    animation = windowsIn,1,6,overshot,slide
    animation = windowsOut,1,5,smooth,slide

    animation = workspaces,1,6,overshot,slide

    animation = layers,1,4,smooth
    animation = layersIn,1,5,overshot,slide
    animation = layersOut,1,3,smooth,fade
}


#############
### LAYOUT ###
#############

dwindle {

    pseudotile = true
    preserve_split = true
}

master {

    new_status = master
}

misc {

    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {

    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {

    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

#bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, P, exec, systemctl poweroff
bind = $mainMod SHIFT, R, exec, systemctl reboot
bind = $mainMod, W, exec, waypaper && sddm-wall-update

bind = $mainMod, T, exec, kitty -e tty-clock -s -c -C 7

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod SHIFT, Q, killactive

bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, E, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager

bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


###################
### WORKSPACES ###
###################

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, S, togglespecialworkspace, magic

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


###################
### MEDIA KEYS ###
###################

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 3%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 3%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 3%-


bindl = ,XF86AudioNext, exec, playerctl next
bindl = ,XF86AudioPause, exec, playerctl play-pause
bindl = ,XF86AudioPlay, exec, playerctl play-pause
bindl = ,XF86AudioPrev, exec, playerctl previous

###################
### AUTOSTART ###
###################

exec-once = waybar
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swww-daemon
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP